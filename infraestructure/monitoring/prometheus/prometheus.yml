global:
  scrape_interval: 15s      # Cada cuánto tiempo Prometheus recolecta datos
  evaluation_interval: 15s  # Cada cuánto evalúa reglas de alerta

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Conexión con cAdvisor
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'rayen-backend'
    static_configs:
      - targets: ['backend:5000']