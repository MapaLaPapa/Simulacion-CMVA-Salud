[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0

[1000]
type=endpoint
context=ivr-rayen
disallow=all
allow=ulaw
allow=alaw
auth=1000
aors=1000
; --- PARCHES MÁGICOS PARA AUDIO EN DOCKER/ZOIPER ---
direct_media=no
force_rport=yes
rtp_symmetric=yes
rewrite_contact=yes

[1000]
type=auth
auth_type=userpass
password=rayen_secreto
username=1000

[1000]
type=aor
max_contacts=1